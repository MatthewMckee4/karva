name: Bug report
description: Report an error or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report an issue! We're glad to have you involved with Karva.

        **Before reporting, please make sure to search through [existing issues](https://github.com/MatthewMckee4/karva/issues?q=is:issue+is:open+label:bug) (including [closed](https://github.com/MatthewMckee4/karva/issues?q=is:issue%20state:closed%20label:bug)).**

  - type: textarea
    attributes:
      label: Summary
      description: |
        A clear and concise description of the bug, including a minimal reproducible example.

        Be sure to include the command you invoked (e.g., `karva test /path/to/file.py`)
        and the full output, including the complete error message.

        If the behavior depends on configuration, include the relevant section from
        your `pyproject.toml`.

    validations:
      required: true

  - type: input
    attributes:
      label: Platform
      description: What operating system and architecture are you using? (see `uname -orsm`)
      placeholder: e.g., macOS 15 arm64, Windows 11 x86_64, Ubuntu 24.04 amd64
    validations:
      required: true

  - type: input
    attributes:
      label: Version
      description: What version of Karva are you using? (see `karva --version`)
      placeholder: e.g., Karva 0.1.0
    validations:
      required: true

  - type: input
    attributes:
      label: Python version
      description: What version of Python are you using? (see `python --version`)
      placeholder: e.g., Python 3.12.6
    validations:
      required: true
